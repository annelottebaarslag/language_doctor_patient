version: '3'
services:
  umls:
    container_name: umls
    command: --character-set-server=utf8 --collation-server=utf8_unicode_ci
    image: mysql:5.7
    restart: always
    ports:
      - 3308:3306
    environment:
      MYSQL_DATABASE: umls
      MYSQL_ROOT_PASSWORD: test
    volumes:
      - ${UMLS_DB_DIR}:/var/lib/mysql/:rw
      - ${SRC_FILE_DIR}:/src_files/:rw